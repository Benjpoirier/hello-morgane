name: Deploy

on:
  push:
    branches: [main]

  # Déclenché par le repo Morgane à chaque release publiée.
  repository_dispatch:
    types: [morgane-release]

  # Filet de sécurité : si le dispatch échoue, le site rattrape la release
  # dans la nuit. Le build lit l'API GitHub, donc un rebuild suffit.
  schedule:
    - cron: '0 4 * * *'

  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          protocol: ftp
          dangerous-clean-slate: false

      - name: Ping IndexNow (Bing, Yandex, Seznam…)
        run: |
          SITE=$(grep -o '<link rel="canonical" href="[^"]*"' dist/index.html | sed 's/.*href="//;s/"$//')
          KEY=$(ls dist | grep -E '^[0-9a-f]{32}\.txt$' | sed 's/\.txt$//')
          echo "Signalement de $SITE"
          curl -sS -o /dev/null -w 'IndexNow: HTTP %{http_code}\n' \
            "https://api.indexnow.org/indexnow?url=${SITE}&key=${KEY}&keyLocation=${SITE}${KEY}.txt"
